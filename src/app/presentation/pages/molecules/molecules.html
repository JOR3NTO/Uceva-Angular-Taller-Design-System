<dsb-container-atom title="Button Group" >
    <dsb-button-group-molecule
        [buttonsGroupData]="buttonsGroupData"
        (clicker)="onClick($event)" >
    </dsb-button-group-molecule>
</dsb-container-atom>

<dsb-container-atom title="Nav Link" >
    <dsb-nav-link-molecule [navLinks]="navLinks">
    </dsb-nav-link-molecule>
</dsb-container-atom>

<dsb-container-atom title="Alert Group" >
    <dsb-alert-group [alertsGroupData]="alertsGroupData"></dsb-alert-group>
</dsb-container-atom>
