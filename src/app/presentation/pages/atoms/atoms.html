<dsb-container-atom title="Icon" >
    <section class="d-flex gap-5" >
        @for(icon of icons; track icon){
            <dsb-icon-atom [icon]="icon.name" [size]="icon.size"></dsb-icon-atom>
        }
    </section>
</dsb-container-atom>

<dsb-container-atom title="Badge" >
    <section class="d-flex gap-2" >
        @for(badge of badges; track badge){
            <dsb-badge-atom [text]="badge.type | titlecase" [type]="badge.type" [typeText]="badge.typeText" ></dsb-badge-atom>
        }
    </section>
</dsb-container-atom>

<dsb-container-atom title="Button" >
    <section class="d-flex gap-2" >
        @for(button of buttons; track button){
            <dsb-button-atom
                [idButton]="button.idButton"
                [text]="button.type | titlecase"
                [type]="button.type"
                (clicker)="onClick($event)" >
            </dsb-button-atom>
        }
    </section>
</dsb-container-atom>

<dsb-container-atom title="Alert" >
    <section class="d-flex gap-2" >
      @for(alert of alerts; track alert){
      <dsb-alert-atom
        [text]="alert.type | titlecase"
        [type]="alert.type"
        [typeText]="alert.typeText">
      </dsb-alert-atom>
      }

    </section>
</dsb-container-atom>
