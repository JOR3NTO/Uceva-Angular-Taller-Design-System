<app-container title="Badge" >
    <section class="d-flex gap-2" >
        @for(badge of badges; track badge){
            <badge-atom [text]="badge.type | titlecase" [type]="badge.type" [typeText]="badge.typeText" ></badge-atom>
        }
    </section>
</app-container>

<app-container title="Button" >
    <section class="d-flex gap-2" >
        @for(button of buttons; track button){
            <dsb-button-atom 
                [idButton]="button.idButton" 
                [text]="button.type | titlecase" 
                [type]="button.type" 
                (clicker)="onClick($event)" >
            </dsb-button-atom>
        }
    </section>
</app-container>
