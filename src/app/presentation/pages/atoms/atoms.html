<app-container title="Badge" >
    <h3 class="mt-5">Badges con Text-White</h3>
    <section class="d-flex gap-2" >
        @for(badge of badges; track badge){
            <dsb-badge-atom [text]="badge.type | titlecase" [type]="badge.type" typeText="text-white" ></dsb-badge-atom>
        }
    </section>

    <h3 class="mt-5">Badges con Text-Dark</h3>
    <section class="d-flex gap-2" >
        @for(badge of badges; track badge){
            <dsb-badge-atom [text]="badge.type | titlecase" [type]="badge.type" typeText="text-dark" ></dsb-badge-atom>
        }
    </section>
</app-container>
