        <div class="d-flex align-items-center me-md-auto text-dark text-decoration-none" >
            <h3>
                <dsb-icon-atom 
                    [icon]="navbarConfig.iconConfig.icon" 
                    [size]="navbarConfig.iconConfig.size" >

}
